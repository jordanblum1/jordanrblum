name: Deploy to S3

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 10 }

      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }} \
            --delete

      - name: Invalidate CloudFront cache
        env:
          CONFIGURED_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          distribution_id="$CONFIGURED_DISTRIBUTION_ID"

          if [ -z "$distribution_id" ]; then
            distribution_id="$(
              aws cloudfront list-distributions --output json |
                jq -r '.DistributionList.Items[]? | select((.Aliases.Items // []) | index("blumjordan.com")) | .Id' |
                head -n 1
            )"
          fi

          if [ -z "$distribution_id" ]; then
            echo "::error::No CloudFront distribution found for blumjordan.com"
            exit 1
          fi

          aws cloudfront create-invalidation \
            --distribution-id "$distribution_id" \
            --paths "/*"
