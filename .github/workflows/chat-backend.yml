name: Chat backend

on:
  workflow_dispatch:
    inputs:
      chat_model:
        description: 'Override CHAT_MODEL on the Lambda (leave blank to keep a custom model, or use Haiku 4.5 by default)'
        required: false
        default: ''
      diagnose:
        description: 'Run ONLY the read-only auth diagnostics job (skips provisioning entirely)'
        type: boolean
        required: false
        default: false
  push:
    branches: [master]
    paths:
      - 'server/**'

env:
  AWS_REGION: us-east-1
  FUNCTION_NAME: jordanrblum-chat
  ROLE_NAME: jordanrblum-chat-lambda-role
  TABLE_NAME: jordanrblum-chat-rate-limit
  OAC_NAME: jordanrblum-chat-lambda-oac
  CLOUDFRONT_DISTRIBUTION_ID: E2S9S3SPS1S2DW
  DEFAULT_CHAT_MODEL: claude-haiku-4-5-20251001
  LEGACY_CHAT_MODEL: claude-sonnet-5
  ALLOWED_ORIGINS: '["https://blumjordan.com","https://jordanrblum.com","http://localhost:4321"]'

jobs:
  # Idempotent, re-runnable provisioning: Lambda function + Function URL,
  # transcripts S3 bucket, DynamoDB rate/reveal table, IAM role, and the
  # CloudFront /api/* origin + behavior. Safe to run again any time — every
  # AWS call either converges existing state or is a no-op on repeat.
  #
  # NOT run automatically by this workflow file. Trigger it by hand from the
  # Actions tab (workflow_dispatch) after review.
  provision:
    if: github.event_name == 'workflow_dispatch' && !inputs.diagnose
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 10 }

      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and package the Lambda bundle
        working-directory: server
        run: |
          pnpm build
          command -v zip >/dev/null || sudo apt-get update && sudo apt-get install -y zip
          (cd dist && zip -r ../lambda.zip index.js Jordan_Blum_Product_Engineer.pdf)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Provision IAM role, DynamoDB table, and S3 bucket
        working-directory: server
        run: |
          set -euo pipefail

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="jordanrblum-chat-transcripts-${ACCOUNT_ID}"
          echo "ACCOUNT_ID=${ACCOUNT_ID}" >> "$GITHUB_ENV"
          echo "BUCKET_NAME=${BUCKET_NAME}" >> "$GITHUB_ENV"

          # --- IAM role -------------------------------------------------
          TRUST_POLICY='{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"lambda.amazonaws.com"},"Action":"sts:AssumeRole"}]}'

          if ROLE_ARN=$(aws iam create-role \
            --role-name "$ROLE_NAME" \
            --assume-role-policy-document "$TRUST_POLICY" \
            --query 'Role.Arn' --output text 2>/tmp/role.err); then
            echo "Created IAM role $ROLE_NAME"
            NEW_ROLE=true
          elif grep -q "EntityAlreadyExists" /tmp/role.err; then
            ROLE_ARN=$(aws iam get-role --role-name "$ROLE_NAME" --query 'Role.Arn' --output text)
            echo "IAM role $ROLE_NAME already exists"
            NEW_ROLE=false
          else
            echo "::error::Failed to create/read IAM role $ROLE_NAME"
            cat /tmp/role.err >&2
            exit 1
          fi
          echo "ROLE_ARN=${ROLE_ARN}" >> "$GITHUB_ENV"

          # Scoped to exactly: CloudWatch Logs for this function, S3 PutObject
          # into this transcripts bucket, DynamoDB UpdateItem on this table.
          # (Built as a single-line string — heredocs don't terminate
          # reliably once indented inside a YAML block scalar.)
          POLICY_DOC="{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":[\"logs:CreateLogGroup\",\"logs:CreateLogStream\",\"logs:PutLogEvents\"],\"Resource\":\"arn:aws:logs:${AWS_REGION}:${ACCOUNT_ID}:log-group:/aws/lambda/${FUNCTION_NAME}:*\"},{\"Effect\":\"Allow\",\"Action\":\"s3:PutObject\",\"Resource\":\"arn:aws:s3:::${BUCKET_NAME}/transcripts/*\"},{\"Effect\":\"Allow\",\"Action\":\"dynamodb:UpdateItem\",\"Resource\":\"arn:aws:dynamodb:${AWS_REGION}:${ACCOUNT_ID}:table/${TABLE_NAME}\"}]}"
          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name "${ROLE_NAME}-policy" \
            --policy-document "$POLICY_DOC"

          if [ "$NEW_ROLE" = "true" ]; then
            echo "Waiting for IAM role propagation..."
            sleep 10
          fi

          # --- DynamoDB table (rate limiting + reveal cap) ---------------
          if aws dynamodb create-table \
            --table-name "$TABLE_NAME" \
            --attribute-definitions AttributeName=pk,AttributeType=S \
            --key-schema AttributeName=pk,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST 2>/tmp/table.err; then
            echo "Created DynamoDB table $TABLE_NAME"
            aws dynamodb wait table-exists --table-name "$TABLE_NAME"
          elif grep -q "ResourceInUseException" /tmp/table.err; then
            echo "DynamoDB table $TABLE_NAME already exists"
          else
            echo "::error::Failed to create DynamoDB table $TABLE_NAME"
            cat /tmp/table.err >&2
            exit 1
          fi

          if ! aws dynamodb update-time-to-live \
            --table-name "$TABLE_NAME" \
            --time-to-live-specification "Enabled=true,AttributeName=ttl" 2>/tmp/ttl.err; then
            if grep -q "TimeToLive is already enabled" /tmp/ttl.err; then
              echo "TTL already enabled on $TABLE_NAME"
            else
              echo "::error::Failed to enable TTL on $TABLE_NAME"
              cat /tmp/ttl.err >&2
              exit 1
            fi
          fi

          # --- S3 bucket (private transcripts store) ---------------------
          CREATE_BUCKET_ARGS=(--bucket "$BUCKET_NAME" --region "$AWS_REGION")
          if [ "$AWS_REGION" != "us-east-1" ]; then
            CREATE_BUCKET_ARGS+=(--create-bucket-configuration "LocationConstraint=$AWS_REGION")
          fi

          if aws s3api create-bucket "${CREATE_BUCKET_ARGS[@]}" 2>/tmp/bucket.err; then
            echo "Created S3 bucket $BUCKET_NAME"
          elif grep -q "BucketAlreadyOwnedByYou" /tmp/bucket.err; then
            echo "S3 bucket $BUCKET_NAME already exists"
          else
            echo "::error::Failed to create S3 bucket $BUCKET_NAME"
            cat /tmp/bucket.err >&2
            exit 1
          fi

          aws s3api put-public-access-block --bucket "$BUCKET_NAME" \
            --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

          aws s3api put-bucket-encryption --bucket "$BUCKET_NAME" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

      - name: Create or update the Lambda function
        working-directory: server
        env:
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHAT_MODEL_INPUT: ${{ github.event.inputs.chat_model }}
        run: |
          set -euo pipefail

          if [ -z "${CONTACT_EMAIL:-}" ]; then
            echo "::error::Secret CONTACT_EMAIL is not set — the reveal_email tool has nothing to reveal without it."
            exit 1
          fi
          if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
            echo "::error::Secret ANTHROPIC_API_KEY is not set."
            exit 1
          fi
          # Preserve an intentional custom CHAT_MODEL, but migrate the old
          # Sonnet default to Haiku unless this run explicitly overrides it.
          EXISTING_MODEL=$(aws lambda get-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --query 'Environment.Variables.CHAT_MODEL' --output text 2>/dev/null || echo "None")
          CURRENT_CHAT_MODEL="$DEFAULT_CHAT_MODEL"
          if [ "$EXISTING_MODEL" != "None" ] && [ -n "$EXISTING_MODEL" ] && [ "$EXISTING_MODEL" != "$LEGACY_CHAT_MODEL" ]; then
            CURRENT_CHAT_MODEL="$EXISTING_MODEL"
          fi
          if [ -n "${CHAT_MODEL_INPUT:-}" ]; then
            CURRENT_CHAT_MODEL="$CHAT_MODEL_INPUT"
          fi
          echo "Deploying with CHAT_MODEL=${CURRENT_CHAT_MODEL}"

          ENV_VARS="Variables={CHAT_MODEL=${CURRENT_CHAT_MODEL},CONTACT_EMAIL=${CONTACT_EMAIL},TRANSCRIPTS_BUCKET=${BUCKET_NAME},RATE_TABLE=${TABLE_NAME},ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}}"

          create_function() {
            aws lambda create-function \
              --function-name "$FUNCTION_NAME" \
              --runtime nodejs22.x \
              --role "$ROLE_ARN" \
              --handler index.handler \
              --zip-file fileb://lambda.zip \
              --timeout 30 \
              --memory-size 512 \
              --environment "$ENV_VARS"
          }

          if create_function 2>/tmp/fn.err; then
            echo "Created Lambda function $FUNCTION_NAME"
            aws lambda wait function-active --function-name "$FUNCTION_NAME"
          elif grep -qi "InvalidParameterValueException" /tmp/fn.err && grep -qi "role" /tmp/fn.err; then
            echo "Role not yet assumable — retrying once after a short wait"
            sleep 15
            create_function
            aws lambda wait function-active --function-name "$FUNCTION_NAME"
          elif grep -q "ResourceConflictException" /tmp/fn.err; then
            echo "Lambda function $FUNCTION_NAME already exists — updating"
            aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --zip-file fileb://lambda.zip
            aws lambda wait function-updated --function-name "$FUNCTION_NAME"
            aws lambda update-function-configuration \
              --function-name "$FUNCTION_NAME" \
              --role "$ROLE_ARN" \
              --timeout 30 \
              --memory-size 512 \
              --environment "$ENV_VARS"
            aws lambda wait function-updated --function-name "$FUNCTION_NAME"
          else
            echo "::error::Failed to create/update Lambda function $FUNCTION_NAME"
            cat /tmp/fn.err >&2
            exit 1
          fi

          aws lambda put-function-concurrency \
            --function-name "$FUNCTION_NAME" \
            --reserved-concurrent-executions 2

          # --- Function URL: RESPONSE_STREAM + CORS -----------------------
          # AuthType AWS_IAM — the Function URL is invoked only via the
          # CloudFront origin below (signed with an Origin Access Control),
          # never called directly by browsers.
          CORS_JSON="{\"AllowOrigins\":${ALLOWED_ORIGINS},\"AllowMethods\":[\"POST\"],\"AllowHeaders\":[\"content-type\",\"x-amz-content-sha256\"],\"MaxAge\":600}"

          if FUNCTION_URL=$(aws lambda create-function-url-config \
            --function-name "$FUNCTION_NAME" \
            --auth-type AWS_IAM \
            --invoke-mode RESPONSE_STREAM \
            --cors "$CORS_JSON" \
            --query 'FunctionUrl' --output text 2>/tmp/furl.err); then
            echo "Created Function URL config"
          elif grep -q "ResourceConflictException" /tmp/furl.err; then
            aws lambda update-function-url-config \
              --function-name "$FUNCTION_NAME" \
              --auth-type AWS_IAM \
              --invoke-mode RESPONSE_STREAM \
              --cors "$CORS_JSON" >/dev/null
            FUNCTION_URL=$(aws lambda get-function-url-config \
              --function-name "$FUNCTION_NAME" --query 'FunctionUrl' --output text)
            echo "Updated Function URL config"
          else
            echo "::error::Failed to create/update the Lambda Function URL"
            cat /tmp/furl.err >&2
            exit 1
          fi
          echo "FUNCTION_URL=${FUNCTION_URL}" >> "$GITHUB_ENV"

          # Since October 2025, CloudFront OAC access to a Lambda Function URL
          # requires the resource policy to grant cloudfront.amazonaws.com BOTH
          # lambda:InvokeFunctionUrl AND lambda:InvokeFunction.
          DISTRIBUTION_ARN="arn:aws:cloudfront::${ACCOUNT_ID}:distribution/${CLOUDFRONT_DISTRIBUTION_ID}"
          if ! aws lambda add-permission \
            --function-name "$FUNCTION_NAME" \
            --statement-id AllowCloudFrontInvokeFunctionUrl \
            --action lambda:InvokeFunctionUrl \
            --principal cloudfront.amazonaws.com \
            --source-arn "$DISTRIBUTION_ARN" \
            --source-account "$ACCOUNT_ID" 2>/tmp/perm.err; then
            if grep -q "ResourceConflictException" /tmp/perm.err; then
              echo "CloudFront invoke permission already present"
            else
              echo "::error::Failed to grant CloudFront permission to invoke the Function URL"
              cat /tmp/perm.err >&2
              exit 1
            fi
          fi

          if ! aws lambda add-permission \
            --function-name "$FUNCTION_NAME" \
            --statement-id AllowCloudFrontInvokeFunction \
            --action lambda:InvokeFunction \
            --principal cloudfront.amazonaws.com \
            --source-arn "$DISTRIBUTION_ARN" \
            --source-account "$ACCOUNT_ID" 2>/tmp/perm.err; then
            if grep -q "ResourceConflictException" /tmp/perm.err; then
              echo "CloudFront invoke-function permission already present"
            else
              echo "::error::Failed to grant CloudFront permission to invoke the function"
              cat /tmp/perm.err >&2
              exit 1
            fi
          fi

      - name: Wire the CloudFront /api/* behavior to the Lambda Function URL
        working-directory: server
        run: |
          set -euo pipefail

          # --- Origin Access Control (find-or-create; name isn't unique-enforced) ---
          OAC_ID=$(aws cloudfront list-origin-access-controls \
            --query "OriginAccessControlList.Items[?Name=='${OAC_NAME}'].Id | [0]" --output text)
          if [ "$OAC_ID" = "None" ] || [ -z "$OAC_ID" ]; then
            OAC_ID=$(aws cloudfront create-origin-access-control \
              --origin-access-control-config "Name=${OAC_NAME},SigningProtocol=sigv4,SigningBehavior=always,OriginAccessControlOriginType=lambda" \
              --query 'OriginAccessControl.Id' --output text)
            echo "Created CloudFront OAC $OAC_ID"
          else
            echo "Reusing existing CloudFront OAC $OAC_ID"
          fi

          LAMBDA_DOMAIN=$(echo "$FUNCTION_URL" | sed -E 's#^https?://##; s#/$##')

          aws cloudfront get-distribution-config --id "$CLOUDFRONT_DISTRIBUTION_ID" > /tmp/dist.json
          ETAG=$(python3 -c "import json;print(json.load(open('/tmp/dist.json'))['ETag'])")

          DIST_CONFIG_PATH=/tmp/dist.json \
          OUTPUT_PATH=/tmp/dist-config-updated.json \
          LAMBDA_DOMAIN="$LAMBDA_DOMAIN" \
          OAC_ID="$OAC_ID" \
          python3 infra/update_cloudfront_behavior.py

          aws cloudfront update-distribution \
            --id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --distribution-config file:///tmp/dist-config-updated.json \
            --if-match "$ETAG"

          echo "CloudFront /api/* behavior now targets ${LAMBDA_DOMAIN} via OAC ${OAC_ID}"

  # Ongoing code deploys — runs on every push to master that touches
  # server/**. Infrastructure (Lambda function, Function URL, IAM, DynamoDB,
  # S3, CloudFront) is expected to already exist via the provision job above.
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 10 }

      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and package the Lambda bundle
        working-directory: server
        run: |
          pnpm build
          command -v zip >/dev/null || sudo apt-get update && sudo apt-get install -y zip
          (cd dist && zip -r ../lambda.zip index.js Jordan_Blum_Product_Engineer.pdf)

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy code to the existing Lambda function
        run: |
          set -euo pipefail
          if ! aws lambda get-function --function-name "$FUNCTION_NAME" >/dev/null 2>/tmp/fn.err; then
            echo "::error::Lambda function $FUNCTION_NAME does not exist yet — run the 'provision' job (workflow_dispatch) first."
            cat /tmp/fn.err >&2
            exit 1
          fi
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --zip-file fileb://server/lambda.zip
          aws lambda wait function-updated --function-name "$FUNCTION_NAME"

          CURRENT_CHAT_MODEL=$(aws lambda get-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --query 'Environment.Variables.CHAT_MODEL' --output text)

          if [ "$CURRENT_CHAT_MODEL" = "None" ] || [ -z "$CURRENT_CHAT_MODEL" ] || [ "$CURRENT_CHAT_MODEL" = "$LEGACY_CHAT_MODEL" ]; then
            # Lambda configuration updates replace the entire environment map.
            # Read it into a runner-local file and change only CHAT_MODEL so
            # credentials and the other existing values remain untouched.
            aws lambda get-function-configuration \
              --function-name "$FUNCTION_NAME" \
              --query 'Environment.Variables' --output json \
              > /tmp/lambda-environment-current.json
            jq --arg model "$DEFAULT_CHAT_MODEL" \
              '(. // {}) | .CHAT_MODEL = $model | {Variables: .}' \
              /tmp/lambda-environment-current.json \
              > /tmp/lambda-environment-updated.json

            aws lambda update-function-configuration \
              --function-name "$FUNCTION_NAME" \
              --environment file:///tmp/lambda-environment-updated.json \
              >/dev/null
            aws lambda wait function-updated --function-name "$FUNCTION_NAME"
            echo "Migrated CHAT_MODEL from the legacy Sonnet default to ${DEFAULT_CHAT_MODEL}"
          else
            echo "Preserving custom CHAT_MODEL=${CURRENT_CHAT_MODEL}"
          fi

  # Read-only diagnostics for the live chat auth chain (Function URL auth,
  # Lambda resource policy, CloudFront OAC + /api/* behavior wiring). Makes
  # NO writes. Triggered via workflow_dispatch with the `diagnose` input set.
  # Never prints secret values: the get-function-configuration --query
  # deliberately excludes Environment (it contains the API key).
  diagnose:
    if: github.event_name == 'workflow_dispatch' && inputs.diagnose
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Function URL config (AuthType / InvokeMode / CORS)
        run: |
          echo "=== lambda get-function-url-config ==="
          aws lambda get-function-url-config \
            --function-name "$FUNCTION_NAME" 2>&1 || true

      - name: Lambda resource policy (may AccessDenied — printed, not fatal)
        run: |
          echo "=== lambda get-policy ==="
          aws lambda get-policy \
            --function-name "$FUNCTION_NAME" 2>&1 || true

      - name: CloudFront Origin Access Control config
        run: |
          echo "=== cloudfront get-origin-access-control E3E03MHOU9HH7U ==="
          aws cloudfront get-origin-access-control \
            --id E3E03MHOU9HH7U 2>&1 || true

      - name: CloudFront distribution origins + /api/* behavior + status
        run: |
          echo "=== cloudfront get-distribution-config (origins) ==="
          aws cloudfront get-distribution-config \
            --id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --query "DistributionConfig.Origins.Items[].{Id:Id,DomainName:DomainName,OriginAccessControlId:OriginAccessControlId}" \
            2>&1 || true
          echo "=== cloudfront get-distribution-config (/api/* cache behavior) ==="
          aws cloudfront get-distribution-config \
            --id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --query "DistributionConfig.CacheBehaviors.Items[?PathPattern=='/api/*'].{PathPattern:PathPattern,TargetOriginId:TargetOriginId,AllowedMethods:AllowedMethods.Items,CachePolicyId:CachePolicyId,OriginRequestPolicyId:OriginRequestPolicyId}" \
            2>&1 || true
          echo "=== cloudfront get-distribution (Status) ==="
          aws cloudfront get-distribution \
            --id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --query "Distribution.Status" --output text 2>&1 || true

      - name: Lambda function configuration (Environment deliberately excluded)
        run: |
          echo "=== lambda get-function-configuration (no Environment) ==="
          aws lambda get-function-configuration \
            --function-name "$FUNCTION_NAME" \
            --query '{State:State,LastUpdateStatus:LastUpdateStatus,Timeout:Timeout,MemorySize:MemorySize,Handler:Handler,Runtime:Runtime}' \
            2>&1 || true
