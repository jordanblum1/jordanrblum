    <rect x="494" y="108" width="658" height="474" fill="url(#field-inverse)"/>
    <text x="1116" y="144" text-anchor="end" fill="#5F504A" font-family="ui-monospace, monospace" font-size="12" letter-spacing="0.7">JORDANBLUM.COM</text>

