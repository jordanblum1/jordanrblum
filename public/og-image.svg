<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Jordan Blum — Product Engineer in New York</title>
  <desc id="desc">A warm two-panel portfolio card introducing Jordan Blum alongside his hand-drawn BLUM mark.</desc>
  <defs>
    <radialGradient id="field" cx="62%" cy="34%" r="82%">
      <stop offset="0" stop-color="#C97B70"/>
      <stop offset="0.44" stop-color="#E8C5C0"/>
      <stop offset="1" stop-color="#C8D4DC"/>
    </radialGradient>
    <radialGradient id="field-inverse" cx="18%" cy="82%" r="72%">
      <stop offset="0" stop-color="#9BAFC3" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#9BAFC3" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-shadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#2B2521" flood-opacity="0.1"/>
    </filter>
    <clipPath id="left-panel"><rect x="48" y="108" width="430" height="474" rx="18"/></clipPath>
    <clipPath id="right-panel"><rect x="494" y="108" width="658" height="474" rx="18"/></clipPath>
  </defs>

  <rect width="1200" height="630" fill="#F7F3ED"/>

  <g filter="url(#soft-shadow)">
    <rect x="360" y="28" width="480" height="56" rx="28" fill="#FCFAF6" fill-opacity="0.94" stroke="#DDD5CB"/>
    <circle cx="390" cy="56" r="17" fill="none" stroke="#9C4037" stroke-width="1.5"/>
    <text x="390" y="61" text-anchor="middle" fill="#9C4037" font-family="Georgia, serif" font-size="13" font-weight="700">JRB</text>
    <text x="658" y="61" fill="#746960" font-family="Arial, Helvetica, sans-serif" font-size="14">Work</text>
    <text x="716" y="61" fill="#746960" font-family="Arial, Helvetica, sans-serif" font-size="14">About</text>
    <text x="773" y="61" fill="#746960" font-family="Arial, Helvetica, sans-serif" font-size="14">Email</text>
    <text x="811" y="61" fill="#9C4037" font-family="Arial, Helvetica, sans-serif" font-size="14">↗</text>
  </g>

  <g clip-path="url(#left-panel)">
    <rect x="48" y="108" width="430" height="474" fill="#FCFAF6"/>
    <text x="84" y="176" fill="#2B2521" font-family="Arial, Helvetica, sans-serif" font-size="53" font-weight="600" letter-spacing="-2.4">I’m Jordan,</text>
    <text x="84" y="235" fill="#2B2521" font-family="Arial, Helvetica, sans-serif" font-size="53" font-weight="600" letter-spacing="-2.4">a product</text>
    <text x="84" y="294" fill="#2B2521" font-family="Arial, Helvetica, sans-serif" font-size="53" font-weight="600" letter-spacing="-2.4">engineer in</text>
    <text x="84" y="353" fill="#2B2521" font-family="Arial, Helvetica, sans-serif" font-size="53" font-weight="600" letter-spacing="-2.4">New York.</text>

    <text x="84" y="427" fill="#746960" font-family="Arial, Helvetica, sans-serif" font-size="18">Consumer products, developer tools,</text>
    <text x="84" y="455" fill="#746960" font-family="Arial, Helvetica, sans-serif" font-size="18">and AI agents.</text>

    <line x1="84" y1="510" x2="154" y2="510" stroke="#DDD5CB"/>
    <text x="84" y="545" fill="#2B2521" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600">Currently at Roam.</text>
  </g>
  <rect x="48" y="108" width="430" height="474" rx="18" fill="none" stroke="#DDD5CB"/>

  <g clip-path="url(#right-panel)">
